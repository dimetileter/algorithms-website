<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Algoritma Çalışıyor...</title>
    <!-- Stil dosyaları -->
    <link rel="stylesheet" href="../css/main.css">
    <link rel="stylesheet" href="../css/navbar.css">
    <link rel="stylesheet" href="../css/algorithm-page.css">
</head>
<body>
    <!-- Navbar -->
    <nav class="navbar" id="navbar">
        <div class="container navbar-content">
            <!-- Sol: Geri Dön + Algoritma Adı -->
            <div style="display: flex; align-items: center; height: 100%;">
                <a href="../index.html" class="navbar-brand" style="display: flex; align-items: center; gap: 8px; text-decoration: none;">
                    <span style="font-size: 1.25rem; line-height: 1; transform: translateY(-1px);">&larr;</span>
                    <span style="line-height: 1;">Geri Dön</span>
                </a>
                <div style="height: 20px; width: 1px; background-color: var(--border-color); margin: 0 16px;"></div>
                <h2 id="algo-title" style="margin: 0; font-size: 1.125rem; font-weight: 500; line-height: 1; color: var(--text-primary);">Algoritma Adı</h2>
            </div>
            
            <!-- Sağ: Tema Toggle -->
            <div class="navbar-actions">
                <button class="theme-toggle" id="theme-toggle" aria-label="Tema değiştir">🌙</button>
            </div>
        </div>
    </nav>

    <!-- Mod Geçiş Çubuğu -->
    <div id="mode-bar">
        <button id="btn-mode-viz" class="mode-btn active">&#128249; Görselleştirme</button>
        <button id="btn-mode-build" class="mode-btn">&#9998; İnşaa Modu</button>
    </div>

    <!-- İkiye Bölünmüş Sayfa Düzeni -->
    <main class="algo-container">
        
        <!-- Sol Panel: Graph Görselleştirme Alanı -->
        <section class="visualization-panel">

            <!-- İnşaa Modu Araç Çubuğu (yalnızca Build Mode'da görünür) -->
            <div id="build-toolbar" style="display:none;">
                <button class="build-tool-btn active" data-tool="select" title="Seç / Taşı">&#9654; Seç</button>
                <button class="build-tool-btn" data-tool="addNode" title="Node Ekle">&#9711; Node</button>
                <button class="build-tool-btn" data-tool="addEdge" title="Kenar Çiz">&#8604; Kenar</button>
                <button class="build-tool-btn" data-tool="delete" title="Sil">&#128465; Sil</button>
                <div class="build-toolbar-divider"></div>
                <button id="btn-clear-graph" title="Tüm Grafu Temizle">&#10006; Temizle</button>
            </div>

            <div class="canvas-container">
                <!-- SVG'ye viewBox ekleyerek duyarlı (responsive) boyutlandırma sağlandı -->
                <svg id="graph-svg" viewBox="0 0 1000 600" preserveAspectRatio="xMidYMid meet">
                    <!-- Graf elemanları (JS ile çizilecek) -->
                </svg>
            </div>
            <!-- Kontrol Çubuğu -->
            <div class="controls-bar">
                <button id="btn-play" class="btn">
                    <span>Başlat</span>
                    <div class="spinner"></div>
                </button>
                <button id="btn-pause" class="btn">Duraklat</button>
                <button id="btn-step" class="btn">İleri Adım</button>
                <button id="btn-reset" class="btn">Sıfırla</button>
                <!-- Build Mode: Başlangıç ve bitiş node seçimleri -->
                <div id="node-selectors" style="display:none; align-items:center; gap:8px;">
                    <select id="start-node-select" class="node-select-dropdown">
                        <option value="">Başlangıç...</option>
                    </select>
                    <select id="end-node-select" class="node-select-dropdown">
                        <option value="">Bitiş...</option>
                    </select>
                </div>
                <div class="speed-control">
                    <label for="speed-slider">Hız:</label>
                    <input type="range" id="speed-slider" min="50" max="2000" value="800">
                </div>
            </div>
        </section>

        <!-- Sağ Panel: Bilgi ve Adım İlerleme Paneli -->
        <section class="info-panel">
            
            <div class="tabs">
                <button class="tab-btn active" id="tab-ilerleme">İlerleme</button>
                <button class="tab-btn" id="tab-aciklama">Açıklama</button>
            </div>

            <!-- Adım günlüğü ve durum takip -->
            <div id="execution-log">
                
                <div class="panel-section" style="max-height: 250px; overflow-y: auto;">
                    <h3>Durum Tablosu</h3>
                    <table id="distance-table">
                        <thead>
                            <tr>
                                <th>Düğüm</th>
                                <th>Mesafe</th>
                            </tr>
                        </thead>
                        <tbody>
                            <!-- Veriler buraya eklenecek -->
                        </tbody>
                    </table>
                </div>

                <!-- Algoritma Sonucu (En kısa yol / MST ağırlığı) -->
                <div id="shortest-path-result" class="panel-section result-box" style="display: none;">
                    <h3>📍 Sonuç</h3>
                    <p id="result-text"></p>
                </div>
                
                <div class="panel-section log-wrapper">
                    <h3>İşlem Adımları</h3>
                    <div id="log-container">
                        <!-- Algoritma logları buraya eklenecek -->
                    </div>
                </div>
            </div>

            <!-- Algoritma Açıklama Bölümü (Açıklama Tab'i içeriği) -->
            <div id="algorithm-description" style="display: none; padding: 20px; overflow-y: auto;">
                <!-- İçerik JS tarafından dinamik olarak doldurulacak -->
            </div>
            
        </section>

    </main>

    <!-- Veri Yapıları ve Algoritmalar -->
    <script src="../../structures/graph.js"></script>
    <script src="../../structures/priority-queue.js"></script>
    <script src="../../algorithms/dijkstra.js"></script>
    <script src="../../algorithms/bellman-ford.js"></script>
    <script src="../../algorithms/spanning-tree.js"></script>
    <script src="../../algorithms/kruskal.js"></script>
    <script src="../../algorithms/prim.js"></script>

    <!-- Uygulama Dosyaları -->
    <script src="../js/theme.js"></script>
    <script src="../js/graph-builder.js"></script>
    
    <!-- Görselleştirme Mantığı -->
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const urlParams = new URLSearchParams(window.location.search);
            const algo = urlParams.get('algo');
            
            // Hangi algoritmalar başlangıç/bitiş node gerektiriyor
            const needsEndNode = ['dijkstra', 'bellman-ford'];

            // Sayfa yüklenince Görselleştirme modu varsayılan
            _initVisualizationMode(algo);

            // ─── MOD GEÇİŞİ ──────────────────────────────────────────
            document.getElementById('btn-mode-viz').addEventListener('click', () => {
                if (!document.getElementById('btn-mode-viz').classList.contains('active')) {
                    _switchToVizMode(algo);
                }
            });

            document.getElementById('btn-mode-build').addEventListener('click', () => {
                if (!document.getElementById('btn-mode-build').classList.contains('active')) {
                    _switchToBuildMode(algo, needsEndNode);
                }
            });

            // ─── ARAÇ SEÇİMİ ─────────────────────────────────────────
            document.querySelectorAll('.build-tool-btn').forEach(btn => {
                btn.addEventListener('click', () => {
                    BuildMode.setTool(btn.dataset.tool);
                });
            });

            // Başlat butonu — Build Mode aktifse kendi graph’ına yönlendir
            document.getElementById('btn-play').addEventListener('click', () => {
                const inBuildMode = document.getElementById('btn-mode-build').classList.contains('active');
                if (inBuildMode && !window.isPlaying) {
                    _runAlgorithmOnBuiltGraph(algo);
                }
            });

            // Temizle butonu
            document.getElementById('btn-clear-graph').addEventListener('click', () => {
                BuildMode.reset();
                document.getElementById('log-container').innerHTML = '';
                _resetDropdowns();
            });
        });

        // ─── GÖRSELLEŞTIRME MODUNA GEÇİŞ ─────────────────────────────
        function _switchToVizMode(algo) {
            BuildMode.disable();

            document.getElementById('btn-mode-viz').classList.add('active');
            document.getElementById('btn-mode-build').classList.remove('active');
            document.getElementById('build-toolbar').style.display = 'none';
            document.getElementById('node-selectors').style.display = 'none';

            // Algoritmayı yeniden yükle
            _initVisualizationMode(algo);
        }

        // ─── İNŞAA MODUNA GEÇİŞ ──────────────────────────────────────
        function _switchToBuildMode(algo, needsEndNode) {
            // Çalışan algoritma varsa durdur
            if (window.isPlaying) {
                window.isPlaying = false;
                clearInterval(window.playInterval);
                updateButtonUI('default');
            }

            document.getElementById('btn-mode-build').classList.add('active');
            document.getElementById('btn-mode-viz').classList.remove('active');
            document.getElementById('build-toolbar').style.display = 'flex';

            // Bitiş seçimi sadece ilgili algoritmalar için göster
            const selectors = document.getElementById('node-selectors');
            selectors.style.display = 'flex';
            document.getElementById('end-node-select').style.display =
                needsEndNode.includes(algo) ? 'block' : 'none';

            // SVG'yi temizle ve Build Mode'u etkinleştir
            BuildMode.enable();
            document.getElementById('log-container').innerHTML = '';
        }

        /** Sayfa ilk yüklenince veya Viz moduna dönünce örnek grafu çizer. */
        function _initVisualizationMode(algo) {
            BuildMode.clearSvg();

            // SVG'yi temizle (drawGraph yeniden çizer)
            const svg = document.getElementById('graph-svg');
            while (svg.firstChild) svg.removeChild(svg.firstChild);

            if (algo === 'dijkstra') {
                document.getElementById('algo-title').textContent = "Dijkstra Algoritması";
                initDijkstraExample();
            } else if (algo === 'bellman-ford') {
                document.getElementById('algo-title').textContent = "Bellman-Ford Algoritması";
                initBellmanFordExample();
            } else if (algo === 'kruskal') {
                document.getElementById('algo-title').textContent = "Kruskal Algoritması (MST)";
                initKruskalExample();
            } else if (algo === 'prim') {
                document.getElementById('algo-title').textContent = "Prim Algoritması (MST)";
                initPrimExample();
            } else if (algo === 'spanning-tree') {
                document.getElementById('algo-title').textContent = "Spanning Tree (DFS)";
                initSpanningTreeExample();
            } else {
                document.getElementById('algo-title').textContent = "Bilinmeyen Algoritma (Dijkstra Gösteriliyor)";
                initDijkstraExample();
            }

            // Açıklama sekmesi içeriğini yükle
            loadAlgorithmDescription(algo);
        }

        /** Dropdown'ları sıfırlar. */
        function _resetDropdowns() {
            document.getElementById('start-node-select').innerHTML = '<option value="">Başlangıç...</option>';
            document.getElementById('end-node-select').innerHTML   = '<option value="">Bitiş...</option>';
        }

        /**
         * Build Mode'dan algoritma çalıştırmak için kullanıcının kendi graph’ını
         * alır ve gerekli başlangıç/bitiş seçimlerini kontrol eder.
         */
        function _runAlgorithmOnBuiltGraph(algo) {
            const g = BuildMode.getGraph();
            if (g.isEmpty()) {
                _showBuildWarning('Graph boş! Önce node ve kenar ekleyin.');
                return;
            }

            const startId = document.getElementById('start-node-select').value;
            const endId   = document.getElementById('end-node-select').value;
            const needsEnd = ['dijkstra', 'bellman-ford'].includes(algo);

            if (!startId) {
                _showBuildWarning('Lütfen bir başlangıç node seçin!');
                return;
            }
            if (needsEnd && !endId) {
                _showBuildWarning('Lütfen bir bitiş node seçin!');
                return;
            }

            // Algoritma sonuçlarını hesapla
            let result;
            if (algo === 'dijkstra')     result = Dijkstra.run(g, startId, endId);
            else if (algo === 'bellman-ford') result = BellmanFord.run(g, startId, endId);
            else if (algo === 'kruskal') result = Kruskal.run(g);
            else if (algo === 'prim')    result = Prim.run(g, startId);
            else if (algo === 'spanning-tree') result = SpanningTree.run(g, startId);
            else return;

            setupAlgorithmPlayControls(g, result);
        }

        /** Build Mode'da uyarı banner’ını gösterir. */
        function _showBuildWarning(msg) {
            document.getElementById('warning-banner')?.remove();
            const banner = document.createElement('div');
            banner.id = 'warning-banner';
            banner.textContent = msg;
            document.querySelector('.visualization-panel').appendChild(banner);
            setTimeout(() => banner.remove(), 3000);
        }

        function getCommonGraph() {
            const g = new Graph(false);
            const nodes = {
                'A': {x: 150, y: 300}, 'B': {x: 350, y: 150}, 'C': {x: 350, y: 450}, 
                'D': {x: 550, y: 300}, 'E': {x: 750, y: 150}, 'F': {x: 750, y: 450}, 'Z': {x: 900, y: 300}
            };
            for (const [id, pos] of Object.entries(nodes)) {
                g.addNode(id, id, pos.x, pos.y);
            }
            g.addEdge('A', 'B', 4);  g.addEdge('A', 'C', 2);
            g.addEdge('B', 'C', 1);  g.addEdge('B', 'D', 5);
            g.addEdge('C', 'D', 8);  g.addEdge('C', 'F', 10);
            g.addEdge('D', 'E', 2);  g.addEdge('D', 'F', 6);
            g.addEdge('E', 'F', 3);  g.addEdge('E', 'Z', 3);
            g.addEdge('F', 'Z', 5);
            return g;
        }

        function initDijkstraExample() {
            const g = getCommonGraph();
            drawGraph(g);
            const result = Dijkstra.run(g, 'A', 'Z');
            setupAlgorithmPlayControls(g, result);
        }

        function initBellmanFordExample() {
            const g = getCommonGraph();
            drawGraph(g);
            const result = BellmanFord.run(g, 'A', 'Z');
            setupAlgorithmPlayControls(g, result);
        }

        function initKruskalExample() {
            const g = getCommonGraph();
            drawGraph(g);
            const result = Kruskal.run(g);
            setupAlgorithmPlayControls(g, result);
        }

        function initPrimExample() {
            const g = getCommonGraph();
            drawGraph(g);
            const result = Prim.run(g, 'A');
            setupAlgorithmPlayControls(g, result);
        }

        function initSpanningTreeExample() {
            const g = getCommonGraph();
            drawGraph(g);
            const result = SpanningTree.run(g, 'A');
            setupAlgorithmPlayControls(g, result);
        }

        function setupAlgorithmPlayControls(g, result) {
            window.algoSteps = result.steps;
            window.algoResult = result; // Sonucu sakla (en kısa yol gösterimi için)
            window.currentStep = 0;
            window.isPlaying = false;
            window.playInterval = null;

            // Sonuç kutusunu gizle
            document.getElementById('shortest-path-result').style.display = 'none';
            document.getElementById('result-text').textContent = '';

            // Önceki listener'ları temizlemek için butonları clone-replace ile sıfırla
            ['btn-play','btn-pause','btn-step','btn-reset'].forEach(id => {
                const el = document.getElementById(id);
                const clone = el.cloneNode(true);
                el.parentNode.replaceChild(clone, el);
            });

            document.getElementById('btn-play').addEventListener('click', () => {
                if(!window.isPlaying && window.currentStep < window.algoSteps.length) {
                    window.isPlaying = true;
                    updateButtonUI('running');
                    const interval = getSpeedInterval();
                    window.playInterval = setInterval(playNextStep, interval);
                }
            });

            document.getElementById('btn-pause').addEventListener('click', () => {
                if(window.isPlaying) {
                    window.isPlaying = false;
                    clearInterval(window.playInterval);
                    updateButtonUI('paused');
                } else if (window.currentStep > 0 && window.currentStep < window.algoSteps.length) {
                    window.isPlaying = true;
                    updateButtonUI('running');
                    const interval = getSpeedInterval();
                    window.playInterval = setInterval(playNextStep, interval);
                }
            });

            document.getElementById('btn-step').addEventListener('click', () => {
                if(!window.isPlaying) {
                    playNextStep();
                    if (window.currentStep > 0 && window.currentStep < window.algoSteps.length) {
                         updateButtonUI('paused');
                    }
                }
            });

            document.getElementById('btn-reset').addEventListener('click', () => {
                window.isPlaying = false;
                clearInterval(window.playInterval);
                window.currentStep = 0;
                
                updateButtonUI('default');

                document.getElementById('log-container').innerHTML = '';
                resetGraphColors(g);
                
                // Sonuç kutusunu gizle
                document.getElementById('shortest-path-result').style.display = 'none';
                document.getElementById('result-text').textContent = '';

                if(result.distances) updateTableInit();
                else document.getElementById('distance-table').getElementsByTagName('tbody')[0].innerHTML = '';
            });

            if(result.distances) updateTableInit();
            else document.getElementById('distance-table').getElementsByTagName('tbody')[0].innerHTML = '';
            // Hız slider'ı çalışma sırasında değiştiğinde anında güncelle
            document.getElementById('speed-slider').addEventListener('input', () => {
                if (window.isPlaying) {
                    clearInterval(window.playInterval);
                    const interval = getSpeedInterval();
                    window.playInterval = setInterval(playNextStep, interval);
                }
            });
        }

        // --- BUTTON STATE MANAGER ---
        function updateButtonUI(state) {
            const btnPlay = document.getElementById('btn-play');
            const playSpan = btnPlay.querySelector('span');
            const btnPause = document.getElementById('btn-pause');

            if (state === 'running') {
                btnPlay.className = 'btn btn-playing';
                playSpan.textContent = 'Çalışıyor';
                btnPlay.style.pointerEvents = 'none'; // Tıklamayı engelle
                
                btnPause.className = 'btn btn-paused';
                btnPause.textContent = 'Duraklat';
            } else if (state === 'paused') {
                btnPlay.className = 'btn btn-paused-state';
                playSpan.textContent = 'Duraklatıldı';
                btnPlay.style.pointerEvents = 'none';

                btnPause.className = 'btn btn-resume';
                btnPause.textContent = 'Devam Et';
            } else if (state === 'default') {
                btnPlay.className = 'btn';
                playSpan.textContent = 'Başlat';
                btnPlay.style.pointerEvents = 'auto'; // Tıklamayı geri aç

                btnPause.className = 'btn';
                btnPause.textContent = 'Duraklat';
            }
        }

        /** Slider değerini interval süresine (ms) çevirir. Sağ = hızlı, sol = yavaş. */
        function getSpeedInterval() {
            const slider = document.getElementById('speed-slider');
            const min = parseInt(slider.min);
            const max = parseInt(slider.max);
            // Slider sağa kaydıkça value artar → interval düşer → hız artar
            return (max + min) - parseInt(slider.value);
        }

        function playNextStep() {
            if (window.currentStep >= window.algoSteps.length) {
                window.isPlaying = false;
                clearInterval(window.playInterval);
                updateButtonUI('default');
                addLogLine("Algoritma tamamlandı.", "finish");
                showAlgorithmResult(); // Sonucu göster
                return;
            }

            const step = window.algoSteps[window.currentStep];
            addLogLine(`[${step.type.toUpperCase()}] ${step.description}`, step.type);
            if(step.distances) updateTable(step.distances);
            updateGraphVisuals(step);
            
            window.currentStep++;
        }

        /** Algoritma tamamlandığında sonucu (en kısa yol veya MST ağırlığı) gösterir. */
        function showAlgorithmResult() {
            const result = window.algoResult;
            if (!result) return;

            const resultBox = document.getElementById('shortest-path-result');
            const resultText = document.getElementById('result-text');
            const algo = new URLSearchParams(window.location.search).get('algo');

            if (['dijkstra', 'bellman-ford'].includes(algo)) {
                // En kısa yol gösterimi
                if (result.shortestPath && result.shortestPath.length > 0) {
                    const pathStr = result.shortestPath.join(' → ');
                    resultText.innerHTML = `<strong>En Kısa Yol:</strong> ${pathStr}<br><strong>Toplam Mesafe:</strong> ${result.totalDistance}`;
                } else {
                    resultText.innerHTML = '<strong>Hedefe ulaşılamadı!</strong>';
                }
            } else if (['kruskal', 'prim'].includes(algo)) {
                resultText.innerHTML = `<strong>MST Toplam Ağırlığı:</strong> ${result.totalWeight}`;
            } else if (algo === 'spanning-tree') {
                const edgeCount = result.treeEdges ? result.treeEdges.length : 0;
                resultText.innerHTML = `<strong>Spanning Tree:</strong> ${edgeCount} kenar seçildi.`;
            }

            resultBox.style.display = 'block';
        }

        function addLogLine(text, type) {
            const container = document.getElementById('log-container');
            const div = document.createElement('div');
            div.textContent = text;
            div.className = `log-line log-type-${type}`;
            container.appendChild(div);
            // Sona kaydır
            container.scrollTop = container.scrollHeight;
        }

        function updateTableInit() {
            const tbody = document.getElementById('distance-table').getElementsByTagName('tbody')[0];
            tbody.innerHTML = '';
            ['A','B','C','D','E','F','Z'].forEach(n => {
                const tr = document.createElement('tr');
                tr.innerHTML = `<td style="font-weight: 600;">${n}</td><td>&infin;</td>`;
                tr.id = `row-${n}`;
                tbody.appendChild(tr);
            });
        }

        function updateTable(distances) {
            for (const [node, dist] of Object.entries(distances)) {
                const row = document.getElementById(`row-${node}`);
                if (row) {
                    const displayDist = dist === Infinity ? '&infin;' : dist;
                    row.cells[1].innerHTML = displayDist;
                }
            }
        }

        function drawGraph(graph) {
            const svg = document.getElementById('graph-svg');
            const edges = graph.getAllEdges();
            const drawnEdges = new Set();

            for (const e of edges) {
                const edgeKey1 = `${e.from}-${e.to}`;
                const edgeKey2 = `${e.to}-${e.from}`;
                if (drawnEdges.has(edgeKey1) || drawnEdges.has(edgeKey2)) continue;
                drawnEdges.add(edgeKey1);

                const fromNode = graph.nodes[e.from];
                const toNode = graph.nodes[e.to];
                
                const line = document.createElementNS("http://www.w3.org/2000/svg", "line");
                line.setAttribute("x1", fromNode.x);
                line.setAttribute("y1", fromNode.y);
                line.setAttribute("x2", toNode.x);
                line.setAttribute("y2", toNode.y);
                line.setAttribute("id", `edge-${e.from}-${e.to}`);
                line.style.stroke = "var(--text-secondary)";
                line.style.strokeWidth = "3";
                line.style.transition = "stroke 0.3s ease, stroke-width 0.3s ease";
                svg.appendChild(line);

                const mx = (fromNode.x + toNode.x) / 2;
                const my = (fromNode.y + toNode.y) / 2 - 12;
                const text = document.createElementNS("http://www.w3.org/2000/svg", "text");
                text.setAttribute("x", mx);
                text.setAttribute("y", my);
                text.setAttribute("text-anchor", "middle");
                text.setAttribute("fill", "var(--text-secondary)");
                text.setAttribute("font-weight", "600");
                text.setAttribute("font-size", "14px");
                text.textContent = e.weight;
                svg.appendChild(text);
            }

            for (const [id, node] of Object.entries(graph.nodes)) {
                const group = document.createElementNS("http://www.w3.org/2000/svg", "g");
                
                const circle = document.createElementNS("http://www.w3.org/2000/svg", "circle");
                circle.setAttribute("cx", node.x);
                circle.setAttribute("cy", node.y);
                circle.setAttribute("r", 22);
                circle.setAttribute("id", `node-${id}`);
                circle.style.fill = "var(--bg-primary)";
                circle.style.stroke = "var(--accent-color)";
                circle.style.strokeWidth = "3";
                circle.style.transition = "all 0.3s ease";
                group.appendChild(circle);

                const text = document.createElementNS("http://www.w3.org/2000/svg", "text");
                text.setAttribute("x", node.x);
                text.setAttribute("y", node.y);
                text.setAttribute("alignment-baseline", "middle");
                text.setAttribute("text-anchor", "middle");
                text.setAttribute("fill", "var(--text-primary)");
                text.setAttribute("font-weight", "bold");

        function resetGraphColors(graph) {
            const nodes = document.querySelectorAll('circle');
            nodes.forEach(n => {
                n.style.fill = "var(--bg-primary)";
                n.style.stroke = "var(--accent-color)";
                n.style.r = "22"; // Normal boyut
            });

            const edges = document.querySelectorAll('line');
            edges.forEach(e => {
                e.style.stroke = "var(--text-secondary)";
                e.style.strokeWidth = "3";
            });
        }

        function updateGraphVisuals(step) {
            resetGraphColors(new Graph());

            const visitedColor = "rgba(0, 122, 255, 0.2)"; // Soft mavi
            const activeColor = "#FFD60A"; // Sarımsı aktif renk
            const activeStroke = "#FF9F0A"; // Turuncu çerçeve
            
            // Eğer temamız gece moduysa vurgular daha parlak görünecektir

            step.visitedNodes.forEach(id => {
                const nodeEl = document.getElementById(`node-${id}`);
                if (nodeEl) {
                    nodeEl.style.fill = visitedColor;
                }
            });

            if (step.activeNode) {
                const nodeEl = document.getElementById(`node-${step.activeNode}`);
                if (nodeEl) {
                    nodeEl.style.fill = activeColor;
                    nodeEl.style.stroke = activeStroke;
                    nodeEl.style.r = "25"; // Aktif node biraz büyüsün
                }
            }

            if (step.activeEdge) {
                const {from, to} = step.activeEdge;
                let edgeEl = document.getElementById(`edge-${from}-${to}`);
                if (!edgeEl) edgeEl = document.getElementById(`edge-${to}-${from}`);
                
                if (edgeEl) {
                    edgeEl.style.stroke = activeStroke;
                    edgeEl.style.strokeWidth = "6";
                }
            }
        }
